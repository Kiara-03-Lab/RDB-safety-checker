<text font-size="13" font-weight="500" fill="#085041" x="340" y="420" text-anchor="middle" dominant-baseline="central">Open claude.ai</text>

<line x1="340" y1="442" x2="340" y2="464" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="200" y="466" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
