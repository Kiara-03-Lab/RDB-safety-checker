<text font-size="11" fill="#0F6E56" x="340" y="505" text-anchor="middle" dominant-baseline="central">prompt-vercel.md  or  prompt-railway.md</text>

<line x1="340" y1="522" x2="340" y2="544" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="200" y="546" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#085041" x="340" y="567" text-anchor="middle" dominant-baseline="central">Copy, paste, add your schema</text>
<text font-size="11" fill="#0F6E56" x="340" y="585" text-anchor="middle" dominant-baseline="central">replace [PASTE YOUR SQL HERE]</text>

<line x1="340" y1="602" x2="340" y2="624" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="210" y="626" width="260" height="36" rx="18" fill="#97C459" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#173404" x="340" y="644" text-anchor="middle" dominant-baseline="central">Read the report and fix issues</text>

</svg>
