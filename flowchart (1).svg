<svg width="100%" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text font-size="11" font-weight="500" fill="#888780" letter-spacing="0.07em" x="340" y="26" text-anchor="middle">WITHOUT rdb-safe  vs  WITH rdb-safe</text>

<rect x="60" y="38" width="260" height="32" rx="16" fill="#F7C1C1" stroke="#A32D2D" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#791F1F" x="190" y="54" text-anchor="middle" dominant-baseline="central">Without rdb-safe</text>

<rect x="70" y="86" width="240" height="50" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#A32D2D" x="190" y="106" text-anchor="middle" dominant-baseline="central">Deploy your app</text>
<text font-size="11" fill="#E24B4A" x="190" y="124" text-anchor="middle" dominant-baseline="central">fingers crossed</text>

<line x1="190" y1="136" x2="190" y2="158" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow-red)"/>

<rect x="70" y="160" width="240" height="50" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#A32D2D" x="190" y="180" text-anchor="middle" dominant-baseline="central">App crashes in production</text>
<text font-size="11" fill="#E24B4A" x="190" y="198" text-anchor="middle" dominant-baseline="central">users see errors</text>

<line x1="190" y1="210" x2="190" y2="232" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow-red)"/>

<rect x="70" y="234" width="240" height="50" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#A32D2D" x="190" y="254" text-anchor="middle" dominant-baseline="central">Spend hours reading logs</text>
<text font-size="11" fill="#E24B4A" x="190" y="272" text-anchor="middle" dominant-baseline="central">what went wrong?</text>

<line x1="190" y1="284" x2="190" y2="306" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow-red)"/>

<rect x="90" y="308" width="200" height="32" rx="16" fill="#F09595" stroke="#A32D2D" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#501313" x="190" y="324" text-anchor="middle" dominant-baseline="central">Fix and redeploy</text>

<rect x="360" y="38" width="260" height="32" rx="16" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#27500A" x="490" y="54" text-anchor="middle" dominant-baseline="central">With rdb-safe</text>

<rect x="370" y="86" width="240" height="50" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#27500A" x="490" y="106" text-anchor="middle" dominant-baseline="central">Paste schema into Claude</text>
<text font-size="11" fill="#3B6D11" x="490" y="124" text-anchor="middle" dominant-baseline="central">takes 30 seconds</text>

<line x1="490" y1="136" x2="490" y2="158" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow-green)"/>

<rect x="370" y="160" width="240" height="50" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#27500A" x="490" y="180" text-anchor="middle" dominant-baseline="central">Get a plain-English report</text>
<text font-size="11" fill="#3B6D11" x="490" y="198" text-anchor="middle" dominant-baseline="central">safe / borderline / failure</text>

<line x1="490" y1="210" x2="490" y2="232" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow-green)"/>

<rect x="370" y="234" width="240" height="50" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#27500A" x="490" y="254" text-anchor="middle" dominant-baseline="central">Fix the one thing flagged</text>
<text font-size="11" fill="#3B6D11" x="490" y="272" text-anchor="middle" dominant-baseline="central">before you deploy</text>

<line x1="490" y1="284" x2="490" y2="306" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow-green)"/>

<rect x="390" y="308" width="200" height="32" rx="16" fill="#97C459" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#173404" x="490" y="324" text-anchor="middle" dominant-baseline="central">Deploy with confidence</text>

<line x1="40" y1="362" x2="640" y2="362" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-size="11" font-weight="500" fill="#888780" letter-spacing="0.07em" x="340" y="384" text-anchor="middle">HOW TO USE</text>

