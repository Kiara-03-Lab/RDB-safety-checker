<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Start -->
<rect x="240" y="30" width="200" height="44" rx="22" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" x="340" y="52" text-anchor="middle" dominant-baseline="central">You have a SQL schema</text>

<line x1="340" y1="74" x2="340" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 1 -->
<rect x="200" y="110" width="280" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="340" y="130" text-anchor="middle" dominant-baseline="central">Open Claude.ai</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="340" y="150" text-anchor="middle" dominant-baseline="central">claude.ai is free to use</text>

<line x1="340" y1="166" x2="340" y2="200" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 2 -->
<rect x="200" y="202" width="280" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="340" y="222" text-anchor="middle" dominant-baseline="central">Pick your platform</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="340" y="242" text-anchor="middle" dominant-baseline="central">Vercel or Railway?</text>

<!-- Side labels -->
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="52" y="232" text-anchor="middle">Vercel</text>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="52" y="248" text-anchor="middle">prompt</text>
<line x1="200" y1="230" x2="100" y2="230" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>

<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="628" y="232" text-anchor="middle">Railway</text>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="628" y="248" text-anchor="middle">prompt</text>
<line x1="480" y1="230" x2="580" y2="230" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>

<line x1="340" y1="258" x2="340" y2="292" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 3 -->
<rect x="200" y="294" width="280" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="340" y="314" text-anchor="middle" dominant-baseline="central">Copy the matching prompt file</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="340" y="334" text-anchor="middle" dominant-baseline="central">prompt-vercel.md or prompt-railway.md</text>

<line x1="340" y1="350" x2="340" y2="384" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 4 -->
<rect x="200" y="386" width="280" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="340" y="406" text-anchor="middle" dominant-baseline="central">Paste into Claude + add your schema</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="340" y="426" text-anchor="middle" dominant-baseline="central">Replace [PASTE YOUR SQL HERE]</text>

<line x1="340" y1="442" x2="340" y2="476" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 5 -->
<rect x="200" y="478" width="280" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="340" y="500" text-anchor="middle" dominant-baseline="central">Send and read the report</text>

<line x1="340" y1="522" x2="340" y2="556" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- End -->
<rect x="220" y="558" width="240" height="44" rx="22" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#27500A" x="340" y="580" text-anchor="middle" dominant-baseline="central">Fix issues before going live</text>

</svg>
